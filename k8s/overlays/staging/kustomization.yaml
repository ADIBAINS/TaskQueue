apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: taskqueue-staging

resources:
  - ../../base

patches:
  - target:
      group: apps
      version: v1
      kind: Deployment
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Always
