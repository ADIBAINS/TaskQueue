apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler
  labels:
    app: taskqueue
    service: scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      service: scheduler
  template:
    metadata:
      labels:
        app: taskqueue
        service: scheduler
    spec:
      containers:
        - name: scheduler
          image: taskqueue/scheduler:latest
          envFrom:
            - configMapRef:
                name: taskqueue-config
            - secretRef:
                name: taskqueue-secrets
          env:
            - name: SERVICE_NAME
              value: scheduler
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: scheduler
  labels:
    service: scheduler
spec:
  selector:
    service: scheduler
  ports:
    - port: 3200
      targetPort: 3200
      name: metrics
