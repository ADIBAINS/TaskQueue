apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-image
  labels:
    app: taskqueue
    service: worker-image
spec:
  replicas: 2
  selector:
    matchLabels:
      service: worker-image
  template:
    metadata:
      labels:
        app: taskqueue
        service: worker-image
    spec:
      containers:
        - name: worker-image
          image: taskqueue/worker-image:latest
          envFrom:
            - configMapRef:
                name: taskqueue-config
            - secretRef:
                name: taskqueue-secrets
          env:
            - name: SERVICE_NAME
              value: worker-image
            - name: MAX_CONCURRENCY
              value: "3"
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: worker-image
  labels:
    service: worker-image
spec:
  selector:
    service: worker-image
  ports:
    - port: 3601
      targetPort: 3601
      name: metrics
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: worker-image-scaler
spec:
  scaleTargetRef:
    name: worker-image
  pollingInterval: 15
  cooldownPeriod: 30
  minReplicaCount: 2
  maxReplicaCount: 15
  triggers:
    - type: redis
      metadata:
        address: redis:6379
        listName: queue:image
        listLength: "5"
