apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app: taskqueue
    service: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      service: api-gateway
  template:
    metadata:
      labels:
        app: taskqueue
        service: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: taskqueue/api-gateway:latest
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: taskqueue-config
            - secretRef:
                name: taskqueue-secrets
          env:
            - name: SERVICE_NAME
              value: api-gateway
            - name: PORT
              value: "3000"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  labels:
    service: api-gateway
spec:
  selector:
    service: api-gateway
  ports:
    - port: 80
      targetPort: 3000
      name: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
