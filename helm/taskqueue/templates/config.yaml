apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  KAFKA_BROKERS: {{ .Values.infrastructure.kafka.brokers | quote }}
  REDIS_HOST: {{ .Values.infrastructure.redis.host | quote }}
  REDIS_PORT: {{ .Values.infrastructure.redis.port | quote }}
  LOG_LEVEL: "info"
  NODE_ENV: "production"
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.infrastructure.postgres.url | quote }}
  JWT_SECRET: {{ .Values.auth.jwtSecret | quote }}
