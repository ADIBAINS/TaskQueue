{{- $root := . -}}
{{- $ports := dict "api-gateway" $root.Values.apiGateway.port "scheduler" $root.Values.scheduler.port "state-manager" $root.Values.stateManager.port "notifier" $root.Values.notifier.port "metrics-exporter" $root.Values.metricsExporter.port -}}
{{- $workerPorts := dict "email" 3600 "image" 3601 "data" 3602 -}}
{{- range $svc := list "api-gateway" "scheduler" "state-manager" "notifier" "metrics-exporter" }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $svc }}
  labels:
    app.kubernetes.io/name: {{ $root.Chart.Name }}
    app.kubernetes.io/instance: {{ $root.Release.Name }}
    service: {{ $svc }}
spec:
  replicas: 1
  selector:
    matchLabels:
      service: {{ $svc }}
  template:
    metadata:
      labels:
        app: taskqueue
        service: {{ $svc }}
    spec:
      {{- if eq $svc "state-manager" }}
      initContainers:
        - name: migrate
          image: "{{ $root.Values.image.repository }}/state-manager:{{ $root.Values.image.tag }}"
          imagePullPolicy: {{ $root.Values.image.pullPolicy }}
          command: ["node", "services/state-manager/dist/run-migrate.js"]
          envFrom:
            - configMapRef:
                name: {{ $root.Release.Name }}-config
            - secretRef:
                name: {{ $root.Release.Name }}-secrets
      {{- end }}
      containers:
        - name: {{ $svc }}
          image: "{{ $root.Values.image.repository }}/{{ $svc }}:{{ $root.Values.image.tag }}"
          imagePullPolicy: {{ $root.Values.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ $root.Release.Name }}-config
            - secretRef:
                name: {{ $root.Release.Name }}-secrets
          env:
            - name: SERVICE_NAME
              value: {{ $svc }}
            - name: PORT
              value: {{ index $ports $svc | quote }}
            - name: METRICS_PORT
              value: {{ index $ports $svc | quote }}
          ports:
            - containerPort: {{ index $ports $svc }}
          resources:
            {{- toYaml $root.Values.resources.default | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $svc }}
  labels:
    service: {{ $svc }}
spec:
  selector:
    service: {{ $svc }}
  ports:
    - port: {{ index $ports $svc }}
      targetPort: {{ index $ports $svc }}
{{ end }}
---
{{- range $type, $cfg := $root.Values.workers }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-{{ $type }}
  labels:
    app.kubernetes.io/name: {{ $root.Chart.Name }}
    service: worker-{{ $type }}
spec:
  replicas: {{ $cfg.minReplicas }}
  selector:
    matchLabels:
      service: worker-{{ $type }}
  template:
    metadata:
      labels:
        app: taskqueue
        service: worker-{{ $type }}
    spec:
      containers:
        - name: worker-{{ $type }}
          image: "{{ $root.Values.image.repository }}/worker-{{ $type }}:{{ $root.Values.image.tag }}"
          imagePullPolicy: {{ $root.Values.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ $root.Release.Name }}-config
            - secretRef:
                name: {{ $root.Release.Name }}-secrets
          env:
            - name: SERVICE_NAME
              value: worker-{{ $type }}
            - name: MAX_CONCURRENCY
              value: {{ $cfg.maxConcurrency | quote }}
            - name: METRICS_PORT
              value: {{ index $workerPorts $type | quote }}
          ports:
            - containerPort: {{ index $workerPorts $type }}
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
{{- if $root.Values.keda.enabled }}
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: worker-{{ $type }}-scaler
spec:
  scaleTargetRef:
    name: worker-{{ $type }}
  pollingInterval: 15
  cooldownPeriod: 30
  minReplicaCount: {{ $cfg.minReplicas }}
  maxReplicaCount: {{ $cfg.maxReplicas }}
  triggers:
    - type: redis
      metadata:
        address: {{ $root.Values.infrastructure.redis.host }}:{{ $root.Values.infrastructure.redis.port }}
        listName: queue:{{ $type }}
        listLength: {{ $cfg.redisQueueThreshold | quote }}
{{- end }}
---
{{ end }}
