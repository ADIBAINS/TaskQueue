replicaCount: 2

image:
  repository: taskqueue
  tag: latest
  pullPolicy: IfNotPresent

infrastructure:
  kafka:
    brokers: 'kafka:9092'
  redis:
    host: 'redis'
    port: 6379
  postgres:
    url: 'postgresql://taskqueue:taskqueue@postgres:5432/taskqueue'

auth:
  jwtSecret: 'change-me-in-production'

apiGateway:
  port: 3000

scheduler:
  port: 3200

stateManager:
  port: 3300

notifier:
  port: 3400

metricsExporter:
  port: 3500

workers:
  email:
    maxConcurrency: 5
    minReplicas: 2
    maxReplicas: 20
    redisQueueThreshold: 10
  image:
    maxConcurrency: 3
    minReplicas: 2
    maxReplicas: 15
    redisQueueThreshold: 5
  data:
    maxConcurrency: 8
    minReplicas: 2
    maxReplicas: 30
    redisQueueThreshold: 15

resources:
  default:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

keda:
  enabled: true
