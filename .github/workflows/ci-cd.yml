name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.2.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm lint
      - run: pnpm build
      - run: docker compose --profile tools -f docker-compose.production.yml --env-file deploy/.env.production.example config --quiet

  build-and-push:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - scheduler
          - state-manager
          - notifier
          - metrics-exporter
          - worker-email
          - worker-image
          - worker-data
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Normalize image repository
        id: image
        run: |
          echo "prefix=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            SERVICE_NAME=${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.prefix }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ steps.image.outputs.prefix }}/${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy-demo:
    name: Deploy public demo
    runs-on: ubuntu-latest
    needs: build-and-push
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      vars.ENABLE_DEMO_DEPLOY == 'true'
    environment: demo
    concurrency:
      group: taskqueue-demo
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEMO_SSH_KEY }}
          DEMO_KNOWN_HOSTS: ${{ secrets.DEMO_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/taskqueue_demo
          chmod 600 ~/.ssh/taskqueue_demo
          printf '%s\n' "$DEMO_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Upload deployment assets
        env:
          DEMO_HOST: ${{ secrets.DEMO_HOST }}
          DEMO_USER: ${{ secrets.DEMO_USER }}
          DEMO_SSH_PORT: ${{ secrets.DEMO_SSH_PORT }}
        run: |
          SSH_PORT="${DEMO_SSH_PORT:-22}"
          ssh -i ~/.ssh/taskqueue_demo -p "$SSH_PORT" "$DEMO_USER@$DEMO_HOST" \
            "mkdir -p /opt/taskqueue/deploy /opt/taskqueue/config"
          rsync -az --delete -e "ssh -i ~/.ssh/taskqueue_demo -p $SSH_PORT" \
            deploy/ "$DEMO_USER@$DEMO_HOST:/opt/taskqueue/deploy/"
          rsync -az --delete -e "ssh -i ~/.ssh/taskqueue_demo -p $SSH_PORT" \
            config/ "$DEMO_USER@$DEMO_HOST:/opt/taskqueue/config/"
          rsync -az -e "ssh -i ~/.ssh/taskqueue_demo -p $SSH_PORT" \
            docker-compose.production.yml \
            "$DEMO_USER@$DEMO_HOST:/opt/taskqueue/docker-compose.production.yml"

      - name: Authenticate server to GHCR
        env:
          DEMO_HOST: ${{ secrets.DEMO_HOST }}
          DEMO_USER: ${{ secrets.DEMO_USER }}
          DEMO_SSH_PORT: ${{ secrets.DEMO_SSH_PORT }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          printf '%s' "$GHCR_TOKEN" | ssh \
            -i ~/.ssh/taskqueue_demo \
            -p "${DEMO_SSH_PORT:-22}" \
            "$DEMO_USER@$DEMO_HOST" \
            "docker login ghcr.io --username '$GHCR_USERNAME' --password-stdin"

      - name: Deploy immutable image tag
        env:
          DEMO_HOST: ${{ secrets.DEMO_HOST }}
          DEMO_USER: ${{ secrets.DEMO_USER }}
          DEMO_SSH_PORT: ${{ secrets.DEMO_SSH_PORT }}
        run: |
          ssh \
            -i ~/.ssh/taskqueue_demo \
            -p "${DEMO_SSH_PORT:-22}" \
            "$DEMO_USER@$DEMO_HOST" \
            "chmod +x /opt/taskqueue/deploy/scripts/*.sh && \
             /opt/taskqueue/deploy/scripts/deploy.sh '${{ github.sha }}'"
