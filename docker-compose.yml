services:
  # --- Infrastructure ---

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    container_name: tq-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - '2181:2181'
    healthcheck:
      test: ['CMD', 'nc', '-z', 'localhost', '2181']
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: tq-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - '9092:9092'
      - '29092:29092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    healthcheck:
      test: ['CMD', 'kafka-broker-api-versions', '--bootstrap-server', 'localhost:9092']
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-init:
    image: confluentinc/cp-kafka:7.7.0
    container_name: tq-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ['/bin/sh', '-c']
    command:
      - |
        echo "Creating Kafka topics..."
        cub kafka-ready -b kafka:9092 1 30
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic job.submitted --partitions 3 --replication-factor 1
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic job.scheduled --partitions 3 --replication-factor 1
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic job.assigned --partitions 3 --replication-factor 1
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic job.completed --partitions 3 --replication-factor 1
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic job.failed --partitions 3 --replication-factor 1
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic job.state-change --partitions 3 --replication-factor 1
        echo "All topics created."
        exit 0

  postgres:
    image: postgres:16-alpine
    container_name: tq-postgres
    environment:
      POSTGRES_USER: taskqueue
      POSTGRES_PASSWORD: taskqueue
      POSTGRES_DB: taskqueue
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U taskqueue']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tq-redis
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Observability ---

  prometheus:
    image: prom/prometheus:v3.0.0
    container_name: tq-prometheus
    ports:
      - '9090:9090'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - promdata:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'

  grafana:
    image: grafana/grafana:11.3.0
    container_name: tq-grafana
    ports:
      - '3001:3000'
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafdata:/var/lib/grafana
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./config/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml

  # --- Distributed Tracing ---

  jaeger:
    image: jaegertracing/all-in-one:1.62
    container_name: tq-jaeger
    ports:
      - '16686:16686' # UI
      - '4317:4317' # OTLP gRPC
      - '4318:4318' # OTLP HTTP

volumes:
  pgdata:
  redisdata:
  promdata:
  grafdata:
