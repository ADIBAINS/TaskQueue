global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: scheduler
    static_configs:
      - targets: ['scheduler:3200']

  - job_name: state-manager
    static_configs:
      - targets: ['state-manager:3300']

  - job_name: metrics-exporter
    static_configs:
      - targets: ['metrics-exporter:3500']

  - job_name: worker-email
    static_configs:
      - targets: ['worker-email:3600']

  - job_name: worker-image
    static_configs:
      - targets: ['worker-image:3601']

  - job_name: worker-data
    static_configs:
      - targets: ['worker-data:3602']
